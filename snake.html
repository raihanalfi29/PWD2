<!DOCTYPE html>
<html>
<head>
<title>Snake Game</title>

<style>

body{
text-align:center;
font-family:Arial;
background:#111;
color:white;
}

canvas{
background:#000;
border:3px solid white;
margin-top:20px;
}

button{
margin:5px;
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

.controls{
margin-top:15px;
}

</style>

</head>

<body>

<h1>Snake Game</h1>

<p>
Cara bermain:
<br><br>
💻 Laptop : gunakan tombol panah keyboard
<br>
📱 HP : gunakan tombol arah di bawah
<br><br>
Makan kotak merah untuk menambah skor.
<br>
Jangan menabrak dinding atau tubuh sendiri.
</p>

<button onclick="startGame()">Start Game</button>

<br>

<canvas id="game" width="400" height="400"></canvas>

<div class="controls">

<br>

<button onclick="changeDir('up')">⬆️</button>

<br>

<button onclick="changeDir('left')">⬅️</button>
<button onclick="changeDir('down')">⬇️</button>
<button onclick="changeDir('right')">➡️</button>

</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let snake;
let food;
let dx;
let dy;
let score;
let game;

function randomFood(){

food = {
x: Math.floor(Math.random()*20)*20,
y: Math.floor(Math.random()*20)*20
};

}

function draw(){

ctx.fillStyle="black";
ctx.fillRect(0,0,400,400);

ctx.fillStyle="red";
ctx.fillRect(food.x,food.y,20,20);

ctx.fillStyle="lime";

snake.forEach(part=>{
ctx.fillRect(part.x,part.y,20,20);
});

ctx.fillStyle="white";
ctx.fillText("Score: "+score,10,15);

}

function move(){

const head = {x:snake[0].x+dx,y:snake[0].y+dy};

if(
head.x<0 || head.x>=400 ||
head.y<0 || head.y>=400 ||
snake.some(p=>p.x===head.x && p.y===head.y)
){
clearInterval(game);
alert("Game Over! Score: "+score);
return;
}

snake.unshift(head);

if(head.x===food.x && head.y===food.y){

score++;
randomFood();

}else{

snake.pop();

}

draw();

}

function startGame(){

snake=[{x:200,y:200}];
dx=20;
dy=0;
score=0;

randomFood();

clearInterval(game);
game=setInterval(move,120);

}

function changeDir(dir){

if(dir==="up" && dy===0){
dx=0;
dy=-20;
}

if(dir==="down" && dy===0){
dx=0;
dy=20;
}

if(dir==="left" && dx===0){
dx=-20;
dy=0;
}

if(dir==="right" && dx===0){
dx=20;
dy=0;
}

}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowUp") changeDir("up");
if(e.key==="ArrowDown") changeDir("down");
if(e.key==="ArrowLeft") changeDir("left");
if(e.key==="ArrowRight") changeDir("right");

});

</script>

</body>
</html>
